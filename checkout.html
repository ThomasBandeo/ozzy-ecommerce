<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | OZZY</title>
  <link rel="stylesheet" href="css/main.css">
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-container">
      <h1 class="logo">
        <a href="/">OZZY</a>
      </h1>
    </div>
  </header>

  <!-- MAIN -->
  <main class="checkout-page">
    <div class="checkout-container">

      <!-- CARRITO / TABLA -->
      <section class="section-cart">

        <table class="table">
          <thead class="thead">
            <tr>
              <th>Producto</th>
              <th>Descripción</th>
              <th>Precio</th>
              <th>Cantidad</th>
              <th>Subtotal</th>
              <th>Borrar</th>
            </tr>
          </thead>

          <tbody class="tbody">
            <!-- FILAS GENERADAS POR JS -->
          </tbody>
        </table>

      </section>

      <!-- RESUMEN DE COMPRA -->
      <section class="shopping-summary">

        <div class="summary-box">

          <h2>Resumen de compra</h2>

          <!-- ENVÍO -->
          <div class="shipping-box">
            <h3>🚚 Calcular tiempos y costos de envío</h3>
            <div class="shipping-form">
              <input type="text" class="shipping-zip" placeholder="Código postal">
              <button class="shipping-btn">Calcular</button>
            </div>
          </div>

          <!-- TOTALES -->
          <div class="summary-totals">
            <div class="summary-totals-div">
              <p>Subtotal</p>
              <p class="subtotal-price">$0</p>
            </div>

            <div class="summary-totals-div">
              <p>Envío estimado. Calculá según tu código postal.</p>
              <p class="shipping-price">Gratis</p>
            </div>

            <div class="total summary-totals-div">
              <p>Total</p>
              <p class="total-price">$0</p>
            </div>
          </div>

        </div>

        <!-- ACCIONES -->
        <div class="summary-actions">
          <button class="btn-primary btn-member">Comprar como miembro</button>
          <button class="btn-secondary">Comprar como invitado</button>
          <button class="continue-shopping">Seguir comprando</button>
        </div>

      </section>

    </div>
  </main>

  <!-- SCRIPT -->
  <script type="module" src="js/ui/checkout.js"></script>

</body>
</html>
