<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrarse | OZZY</title>
  <link rel="stylesheet" href="css/main.css" />
</head>

<body>
  <main class="login-container">

    <h1>Crear cuenta</h1>
    <p class="login-subtitle">
      Registrate para comprar más rápido
    </p>

    <form class="register-form">

      <div class="form-row">
        <div class="form-group">
          <label for="name">Nombre</label>
          <input type="text" id="name" required />
        </div>

        <div class="form-group">
          <label for="lastname">Apellido</label>
          <input type="text" id="lastname" required />
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" required />
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmar Contraseña</label>
        <input type="password" id="confirmPassword"  name="confirmPassword" required />
      </div>

      <button type="submit" class="btn-primary">
        Registrarme
      </button>

    </form>

    <div class="login-links">
      <a href="login.html">¿Ya tenés cuenta? Iniciá sesión</a>
    </div>

    <button class="btn-secondary continue-shopping">
      Volver al carrito
    </button>

  </main>

  <script type="module" src="js/ui/register.js"></script>
</body>
</html>
