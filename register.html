<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear cuenta | OZZY</title>
  <link rel="stylesheet" href="css/main.css" />
</head>

<body>

  <main class="login-container">
    <h1>Crear cuenta</h1>
    <p class="login-subtitle">
      Registrate para comprar más rápido
    </p>

    <form class="register-form">

      <div class="form-row">
        <div class="form-group">
          <label for="name">Nombre</label>
          <input type="text" id="name" name="name" placeholder="Juan" required />
        </div>

        <div class="form-group">
          <label for="lastname">Apellido</label>
          <input type="text" id="lastname" name="lastname" placeholder="Pérez" required />
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="ejemplo@email.com" required />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres" required />
        <p class="error-message" id="passwordError"></p>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmar Contraseña</label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repetí la contraseña" required />
        <p class="error-message" id="confirmPasswordError"></p>
      </div>

      <button type="submit" class="btn btn-primary">
        Registrarme
      </button>

    </form>

    <div class="login-links">
      <a href="login.html">¿Ya tenés cuenta? Iniciá sesión</a>
    </div>

    <button class="btn btn-text continue-shopping">
      Volver al carrito
    </button>
  </main>

  <script type="module" src="js/pages/register.js"></script>
</body>
</html>
