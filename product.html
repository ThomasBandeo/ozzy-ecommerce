<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Producto | OZZY</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <!-- HEADER -->
  <!-- OVERLAY -->
  <!-- CART-OVERLAY -->

  <!-- CONTENIDO PRINCIPAL -->
  <main class="product-page">
    <div class="product-container">

      <div class="product-gallery">
        <img id="mainImage" src="" alt="">
        <div class="thumbnails" id="thumbnails"></div>
      </div>

      <div class="product-details">
        <h1 id="title"></h1>
        <p class="product-category" id="category"></p>
        <p class="product-description" id="description">
          Producto de alta calidad con diseño moderno y excelente confección.
        </p>
        <p class="product-price" id="price"></p>

        <div class="size-selector">
          <div class="size-selector-header">
              <p class="size-title">seleccionar talle</p>
              <button class="size-guide-link" type="button">Guía de talles</button>
          </div>

          <!-- Modal -->
          <div class="size-guide-modal" id="sizeGuideModal">
            <div class="size-guide-content">
              <button class="close-modal" id="closeSizeGuide">✕</button>
              <img src="assets/images/products/talles.png" alt="Guía de talles" class="size-guide-image">
            </div>
          </div>
        
          <div class="sizes">
            <button class="size-btn">S</button>
            <button class="size-btn">M</button>
            <button class="size-btn">L</button>
            <button class="size-btn">XL</button>
          </div>
        </div>

        <button class="btn btn-primary add-cart-btn" disabled>Agregar al carrito</button>
      </div>
      
    </div>
  </main>

  <script type="module" src="js/pages/product.js"></script>

</body>
</html>
