<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <main class="guest-checkout-container">

      <h1>Finalizar compra</h1>
      <p class="checkout-subtitle">
        Completá tus datos para continuar como invitado
      </p>

      <form class="guest-form">

        <div class="form-row">
          <div class="form-group">
            <label>Nombre</label>
            <input type="text" required />
          </div>

          <div class="form-group">
            <label>Apellido</label>
            <input type="text" required />
          </div>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" placeholder="ejemplo@mail.com" required />
        </div>

        <div class="form-group">
          <label>Dirección</label>
          <input type="text" placeholder="Calle y número" required />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Código postal</label>
            <input type="text" required />
          </div>

          <div class="form-group">
            <label>Ciudad</label>
            <input type="text" required />
          </div>
        </div>

        <button type="submit" class="btn-primary">
          Confirmar compra
        </button>

      </form>

      <button class="btn-secondary continue-shopping">
        Volver al carrito
      </button>
  </main>

  <!-- SCRIPT -->
  <script type="module" src="js/ui/checkout-guest.js"></script>
</body>
</html>
